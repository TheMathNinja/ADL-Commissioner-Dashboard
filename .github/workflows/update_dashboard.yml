name: Update Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: Rscript -e "install.packages(c('tidyverse','readr'), repos='https://cloud.r-project.org')"

      - name: Run SalAdjCurator script
        run: Rscript scripts/run_saladjcurator.R

      - name: Build dashboard site
        run: Rscript scripts/build_dashboard.R

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "Automated dashboard update"
          git push