name: Update Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * *"
    - cron: "17 10 * * *"

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Decide whether scheduled run should proceed
        id: localtime
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Push/manual run -> proceeding."
            exit 0
          fi

          LOCAL_HOUR=$(TZ=America/Toronto date +%H)
          echo "Toronto local hour is $LOCAL_HOUR"

          if [ "$LOCAL_HOUR" = "05" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "It is 5 a.m. in Toronto -> proceeding."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not 5 a.m. in Toronto -> skipping."
          fi

      - name: Set up R
        if: steps.localtime.outputs.should_run == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        if: steps.localtime.outputs.should_run == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::readr
          cache-version: 1

      - name: Verify packages
        if: steps.localtime.outputs.should_run == 'true'
        shell: Rscript {0}
        run: |
          library(tidyverse)
          library(readr)
          sessionInfo()

      - name: Run SalAdjCurator script
        if: steps.localtime.outputs.should_run == 'true'
        run: Rscript scripts/run_saladjcurator.R

      - name: Build dashboard site
        if: steps.localtime.outputs.should_run == 'true'
        run: Rscript scripts/build_dashboard.R

      - name: Commit generated files
        if: steps.localtime.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "Automated dashboard update"
          git push