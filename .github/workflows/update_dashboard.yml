name: Update Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'data/**'
  schedule:
    - cron: "17 9 * * *"
    - cron: "17 10 * * *"

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    env:
      RAW_CACHE_DIR: cache/raw_league_data
      RAW_CACHE_VERSION: v1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Decide whether scheduled run should proceed
        id: localtime
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Push/manual run -> proceeding."
            exit 0
          fi

          LOCAL_HOUR=$(TZ=America/Toronto date +%H)
          echo "Toronto local hour is $LOCAL_HOUR"

          if [ "$LOCAL_HOUR" = "05" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "It is 5 a.m. in Toronto -> proceeding."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not 5 a.m. in Toronto -> skipping."
          fi

      - name: Create cache directories
        if: steps.localtime.outputs.should_run == 'true'
        run: |
          mkdir -p "${RAW_CACHE_DIR}"
          mkdir -p data
          mkdir -p docs

      - name: Restore raw league data cache
        if: steps.localtime.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.RAW_CACHE_DIR }}
          key: ${{ runner.os }}-raw-league-data-${{ env.RAW_CACHE_VERSION }}-${{ hashFiles('scripts/**/*.R', 'R/**/*.R') }}
          restore-keys: |
            ${{ runner.os }}-raw-league-data-${{ env.RAW_CACHE_VERSION }}-

      - name: Set up R
        if: steps.localtime.outputs.should_run == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        if: steps.localtime.outputs.should_run == 'true'
        run: |
          Rscript -e "install.packages('tidyverse', repos='https://cloud.r-project.org')"

      - name: Verify packages
        if: steps.localtime.outputs.should_run == 'true'
        shell: Rscript {0}
        run: |
          library(tidyverse)
          sessionInfo()

      - name: Run SalAdjCurator script
        if: steps.localtime.outputs.should_run == 'true'
        env:
          RAW_CACHE_DIR: ${{ env.RAW_CACHE_DIR }}
        run: Rscript scripts/run_saladjcurator.R

      - name: Build dashboard site
        if: steps.localtime.outputs.should_run == 'true'
        env:
          RAW_CACHE_DIR: ${{ env.RAW_CACHE_DIR }}
        run: Rscript scripts/build_dashboard.R

      - name: Commit generated files
        if: steps.localtime.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "Automated dashboard update"
          git push